services:
  postgres:
    image: postgres:16-alpine
    container_name: sonoria-postgres
    environment:
      POSTGRES_DB: sonoria
      POSTGRES_USER: sonoria
      POSTGRES_PASSWORD: sonoria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sonoria
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonoria -d sonoria"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sonoria-redis
    ports:
      - "6380:6379"  # 6380 côté host pour éviter conflit avec un autre Redis local (ex. la-pioche)
    networks:
      - sonoria
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: sonoria-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - sonoria
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: sonoria-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - sonoria
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo 'waiting for minio...'; sleep 2;
        done;
        mc mb local/sonoria-audio --ignore-existing;
        mc anonymous set download local/sonoria-audio || true;
        printf '%s' '{"CORSRules":[{"AllowedOrigins":["http://localhost:3002","http://localhost:3010"],"AllowedMethods":["GET","PUT","HEAD"],"AllowedHeaders":["*"],"ExposeHeaders":["ETag"]}]}' > /tmp/cors.json;
        mc cors set local/sonoria-audio /tmp/cors.json || true;
        echo 'minio bootstrap complete';
      "
    restart: "no"

  gateway:
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile
    container_name: sonoria-gateway
    env_file:
      - ./apps/gateway/.env
    environment:
      PORT: 3010
      REDIS_URL: redis://redis:6379
    ports:
      - "3010:3010"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sonoria

  user-service:
    build:
      context: .
      dockerfile: ./apps/user-service/Dockerfile
    container_name: sonoria-user-service
    env_file:
      - ./apps/user-service/.env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://sonoria:sonoria@postgres:5432/sonoria
      REDIS_URL: redis://redis:6379
      GATEWAY_URL: http://gateway:3010
      USER_SERVICE_INTERNAL_URL: http://user-service:3001
      MEDIA_SERVICE_URL: http://media-service:3002
      JOB_QUEUE_NAME: media-processing
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sonoria

  media-service:
    build:
      context: .
      dockerfile: ./apps/media-service/Dockerfile
    container_name: sonoria-media-service
    env_file:
      - ./apps/media-service/.env
    environment:
      PORT: 3002
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      GATEWAY_URL: http://gateway:3010
      MEDIA_SERVICE_INTERNAL_URL: http://media-service:3002
    ports:
      - "3004:3002"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - sonoria

  job-runner:
    build:
      context: .
      dockerfile: ./apps/job-runner/Dockerfile
    container_name: sonoria-job-runner
    env_file:
      - ./apps/job-runner/.env
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://sonoria:sonoria@postgres:5432/sonoria
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      USER_SERVICE_URL: http://user-service:3001
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - sonoria

  front:
    build:
      context: .
      dockerfile: ./apps/front/Dockerfile
    container_name: sonoria-front
    env_file:
      - ./apps/front/.env
    environment:
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      - gateway
    networks:
      - sonoria

networks:
  sonoria:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
